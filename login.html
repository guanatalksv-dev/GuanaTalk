<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuanaTalk - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="index.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit;">
                <img src="img/logo.png" alt="GuanaTalk Logo">
                <span>GuanaTalk</span>
            </a>
        </div>
        <button class="profile-btn">My Profile</button>
    </header>

    <main class="login-container">
        <div class="login-card">
            <h1>GuanaTalk Login: Start Your Journey</h1>
            
            <form action="php/login.php" method="POST">
                
                <div class="input-group">
                    <div class="icon-box email-icon">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div class="input-field">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="input-group">
                    <div class="icon-box lock-icon">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <div class="input-field">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember"> Remember Me
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>

        <div class="fun-fact-bar">
            <span class="megaphone"><i class="fa-solid fa-bullhorn"></i></span>
            <p><strong>Fun Fact:</strong> Did you know the marble game is known in El Salvador as "chibolas"?</p>
            <span class="arrow">❯</span>
        </div>
    </main>
</body>
</html>
