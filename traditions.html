<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traditions</title>
    <link rel="stylesheet" href="styles/traditions.css">
</head>
<body>

   <header>
        <nav class="navbar">

            <div class="logo">
                <a href="index.html">
                    <img src="img/guanatalk.logo.png" alt="Logo">
                </a>
            </div>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="favoritos.html">Favorite</a></li>
                <li><a href="aboutus.html">About us</a></li>
            </ul>

            <button class="profile-btn">My Profile</button>

        </nav>
    </header>

    <!-- HÉROE / BANNER PRINCIPAL -->
    <main class="main-container">
        <section class="hero-section">
            <div class="hero-text">
                <h1>Traditions</h1>
                <p>Explore the vibrant heritage of El Salvador through its customs and arts.</p>
            </div>
            <div class="hero-image-container">
                <!-- Reemplaza con tu ilustración del mapa/volcán -->
                <img src="hero_illustration.png" alt="El Salvador Traditions" class="hero-img">
            </div>
        </section>

        <!-- SECCIÓN DE CATEGORÍAS (TARJETAS) -->
        <section class="categories-grid">
            
            <div class="card card-light-green">
                <img src="img/fiestas-patronales.png.png" alt="Fiestas Patronales">
                <h3>Fiestas Patronales</h3>
            </div>

            <div class="card card-dark-green">
                <img src="img/folklore-dances.png.png" alt="Folklore Dances">
                <h3>Folklore Dances</h3>
            </div>

            <div class="card card-light-green">
                <img src="img/traditional-games.png" alt="Traditional Games">
                <h3>Traditional Games</h3>
            </div>

            <div class="card card-dark-green">
                <img src="img/unique-celebrations.png.png" alt="Unique Celebrations">
                <h3>Unique Celebrations</h3>
            </div>

        </section>

        <!-- SECCIÓN FUN FACT -->
        <section class="fun-fact-box">
            <div class="fun-fact-content">
                <span class="megaphone-icon">📢</span>
                <p><strong>Fun Fact:</strong> Did you know that the Salvadoran capirucho is hand-carved from cedar wood?</p>
            </div>
        </section>
    </main>

</body>
</html>
