<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register GuanaTalk</title>
    <link rel="stylesheet" href="registerr.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header class="navbar">
         <div class="logo">
            <a href="index.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit;">
                <img src="img/logo.png" alt="GuanaTalk Logo">
                <span>GuanaTalk</span>
            </a>
        </div>
        <button class="profile-btn">My Profile</button>
    </header>

    <div class="container">
        <div class="form-card-header">
            <h2>GuanaTalk Registration: Join Our Journey</h2>
        </div>
    </div>
    
    <form class="forms" action="php/register.php" method="POST">

        <div class="form-grid">

            <div class="form-group-container">
                <div class="icon-column side-name">
                    <span class="emoji-icon"><i class="fa-solid fa-user"></i></span>
                </div>
                <div class="input-column">
                    <label>Full Name</label>
                    <input type="text" name="nombre" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="form-group-container">
                <div class="icon-column side-nationality">
                    <span class="emoji-icon"><i class="fa-solid fa-earth-americas"></i></span>
                </div>
                <div class="input-column">
                    <label>Nationality</label>
                    <select name="nacionalidad" class="select-field" required>
                        <option value="" disabled selected>Select your nationality</option>
                        <option value="Salvadoreño">👤 Salvadoreño</option>
                        <option value="Extranjero">🌍 Extranjero</option>
                    </select>
                </div>
            </div>

            <div class="form-group-container">
                <div class="icon-column side-email">
                    <span class="emoji-icon"><i class="fa-solid fa-envelope"></i></span>
                </div>
                <div class="input-column">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="form-group-container">
                <div class="icon-column side-password">
                    <span class="emoji-icon"><i class="fa-solid fa-lock"></i></span>
                </div>
                <div class="input-column">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a password" required>
                </div>
            </div>

            <div class="form-group-container">
                <div class="icon-column side-password">
                    <span class="emoji-icon"><i class="fa-solid fa-shield-halved"></i></span>
                </div>
                <div class="input-column">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="Confirm your password" required>
                </div>
            </div>

        </div>

        <button class="register-btn" type="submit">Register Now!</button>

    </form>

    <div class="fun-fact">
        <div class="fun-left">
            <span class="megaphone-box"><i class="fa-solid fa-bullhorn"></i></span>
            <p><b>Fun Fact:</b> We're growing global community! Join and meet others</p>
        </div>
        <i class="fa-solid fa-chevron-right"></i>
    </div>

</body>
</html>
