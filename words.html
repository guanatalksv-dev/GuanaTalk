<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words</title>
    <link rel="stylesheet" href="words.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <img src="img/logo.png" alt="">
        </div>

        <nav class="menu">
            <a href="#">Home</a>
            <a href="#">Favorite</a>
            <a href="#">About us</a>
        </nav>

        <button class="profile-btn">My Profile</button>
    </header>

    <!-- SEARCH -->
    <section class="search-section">
        <input type="text" placeholder="🔍">
    </section>

    <!-- TEXT -->
    <section class="hero-text">
        <h1>Words</h1>
        <h2>that accompany you</h2>

        <p>
            Learn new words in a fun way.<br>
            Explore categories and improve your vocabulary
        </p>
    </section>

    <!-- CARDS -->
    <section class="cards">

        <!-- CARD 1 -->
        <div class="card pink">
            <img src="img/boy.png">
            <h3>Bicho/a</h3>

            <audio controls>
                <source src="audio/bicho.mp3" type="audio/mp3">
            </audio>
        </div>

        <!-- CARD 2 -->
        <div class="card orange">
            <img src="img/flag.png">
            <h3>Pulgarcito</h3>

            <audio controls>
                <source src="audio/pulgarcito.mp3" type="audio/mp3">
            </audio>
        </div>

        <!-- CARD 3 -->
        <div class="card lightpink">
            <img src="img/tree.png">
            <h3>Apiate</h3>

            <audio controls>
                <source src="audio/apiate.mp3" type="audio/mp3">
            </audio>
        </div>

        <!-- CARD 4 -->
        <div class="card peach">
            <img src="img/table.png">
            <h3>Volado</h3>

            <audio controls>
                <source src="audio/violado.mp3" type="audio/mp3">
            </audio>
        </div>

        <!-- CARD 5 -->
        <div class="card peach2">
            <img src="img/field.png">
            <h3>Canchita</h3>

            <audio controls>
                <source src="audio/canchita.mp3" type="audio/mp3">
            </audio>
        </div>

        <!-- CARD 6 -->
        <div class="card orange2">
            <img src="img/kids.png">
            <h3>Chero/a</h3>

            <audio controls>
                <source src="audio/chero.mp3" type="audio/mp3">
            </audio>
        </div>

    </section>

    <!-- FOOTER -->
    <footer>
        <a href="#">Home</a>
        <a href="#">Favorites</a>
        <a href="#">Lessons</a>
        <a href="#">My Profile</a>
    </footer>

</body>
</html>
