<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to GuanaTalk</title>
    <link rel="stylesheet" href="welcome.css">
</head>
<body>
    <div id="intro-wrapper">
    <div id="intro-wrapper">
    <div class="particles-container" id="particles-layer"></div>
    <div id="quiz-screen" class="intro-box">
        <div class="brand-logo-top">GUANA<br><span>TALK</span></div>

        <div class="quiz-panel">
            <img src="img/guanatalk.logo.png" alt="GuanaTalk Logo" class="main-logo">
            
            <h1 class="quiz-title">¡Hey! ¿Qué ondas?</h1>
            
            <div class="buttons-container">
                <button class="quiz-btn" onclick="iniciarBienvenida()">
                    <strong>All good!</strong>
                    <span>¡Todo bien!</span>
                </button>
                <button class="quiz-btn" onclick="iniciarBienvenida()">
                    <strong>What's up friend!</strong>
                    <span>¿Qué ondas amigo?</span>
                </button>
            </div>
        </div>
    </div>

    <div id="welcome-screen" class="intro-box hidden">
        <div class="welcome-content">
            <img src="img/guanatalk.logo.png" alt="GuanaTalk Logo" class="welcome-logo">
            <h1 class="welcome-text">
                <span class="word-wave word-1">Welcome</span>
                <span class="word-wave word-2">to</span>
                <span class="word-wave word-3 highlight">GuanaTalk</span>
            </h1>
            <p class="welcome-subtext">The place where you learn to talk like a true Salvadoran. 🇸🇻</p>
            <div class="welcome-loader"></div>
        </div>
    </div>

</div>
</div>
    <div id="halftone-transition-overlay"></div>

<script src="welcome.js"></script> </body>
</html>
</body>
</html>
